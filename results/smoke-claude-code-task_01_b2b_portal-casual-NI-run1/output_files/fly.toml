# Sample Fly.io config. Run `fly launch --no-deploy` to generate yours; this is a starting point.
app = "saas-portal"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[services.http_checks]]
  grace_period = "10s"
  interval = "30s"
  method = "get"
  path = "/api/health"
  protocol = "http"
  timeout = "5s"

[deploy]
  release_command = "npx prisma migrate deploy"

[env]
  NODE_ENV = "production"
  PORT = "3000"
