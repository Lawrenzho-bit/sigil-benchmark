# Fly.io deployment. Usage:
#   fly launch --no-deploy        # create app + attach Postgres
#   fly secrets set SECRET_KEY=... STRIPE_SECRET_KEY=...   (etc.)
#   fly deploy
app = "sigil-portal"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  ENVIRONMENT = "production"
  DEBUG = "false"
  SESSION_COOKIE_SECURE = "true"
  EMAIL_BACKEND = "smtp"
  WEB_CONCURRENCY = "2"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.checks]
    [[http_service.checks]]
      method = "GET"
      path = "/healthz"
      interval = "15s"
      timeout = "5s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
