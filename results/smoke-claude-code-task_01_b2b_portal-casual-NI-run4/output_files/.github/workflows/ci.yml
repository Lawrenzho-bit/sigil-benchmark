name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    name: Lint, type-check & test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: portal
          POSTGRES_PASSWORD: portal
          POSTGRES_DB: portal_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U portal"
          --health-interval 5s --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        # SAML extras are skipped in CI; the app degrades gracefully and the
        # test suite exercises that path explicitly.
        run: pip install -r requirements-dev.txt

      - name: Lint
        run: ruff check app tests

      - name: Type-check
        run: mypy app

      - name: Run tests
        env:
          SECRET_KEY: ci-test-secret-key-at-least-32-characters-long
          DATABASE_URL: postgresql+asyncpg://portal:portal@localhost:5432/portal_test
        run: pytest -q

  docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: sigil-portal:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
