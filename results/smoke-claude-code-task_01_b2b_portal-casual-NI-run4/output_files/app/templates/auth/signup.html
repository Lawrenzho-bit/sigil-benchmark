{% extends "base.html" %}
{% block title %}Create your workspace — {{ app_name }}{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="card">
    <h1>Create your workspace</h1>
    <form method="post" action="/auth/signup">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
      <div class="field">
        <label for="full_name">Your name</label>
        <input type="text" id="full_name" name="full_name" required maxlength="120" autofocus>
      </div>
      <div class="field">
        <label for="organization_name">Organization name</label>
        <input type="text" id="organization_name" name="organization_name"
               required maxlength="120">
      </div>
      <div class="field">
        <label for="email">Work email</label>
        <input type="email" id="email" name="email" required autocomplete="email">
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required
               minlength="10" autocomplete="new-password">
        <p class="hint">At least 10 characters, with letters and numbers.</p>
      </div>
      <div class="field">
        <label class="checkbox">
          <input type="checkbox" name="marketing_consent" value="true">
          <span>Send me occasional product updates. (Optional — you can change
          this any time.)</span>
        </label>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Create workspace</button>
    </form>
    <p class="hint" style="margin-top:1rem">
      By signing up you agree to our <a href="/terms">Terms</a> and
      <a href="/privacy">Privacy Policy</a>.
    </p>
  </div>
  <p class="muted" style="text-align:center">
    Already have an account? <a href="/auth/login">Sign in</a>
  </p>
</div>
{% endblock %}
