{% extends "base.html" %}
{% block title %}Choose a new password — {{ app_name }}{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="card">
    <h1>Choose a new password</h1>
    <form method="post" action="/auth/reset-password">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
      <input type="hidden" name="token" value="{{ token }}">
      <div class="field">
        <label for="password">New password</label>
        <input type="password" id="password" name="password" required
               minlength="10" autocomplete="new-password" autofocus>
        <p class="hint">At least 10 characters, with letters and numbers.</p>
      </div>
      <div class="field">
        <label for="password_confirm">Confirm new password</label>
        <input type="password" id="password_confirm" name="password_confirm"
               required minlength="10" autocomplete="new-password">
      </div>
      <button type="submit" class="btn btn-primary btn-block">Update password</button>
    </form>
  </div>
</div>
{% endblock %}
