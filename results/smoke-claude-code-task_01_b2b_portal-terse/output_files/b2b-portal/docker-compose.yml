# Local/dev orchestration. For production use a managed Postgres and inject
# secrets via the platform, not this file.
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: portal
      POSTGRES_PASSWORD: portal
      POSTGRES_DB: portal
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portal"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://portal:portal@db:5432/portal?schema=public
      APP_URL: http://localhost:3000
      NODE_ENV: production
    ports:
      - "3000:3000"

volumes:
  pgdata:
