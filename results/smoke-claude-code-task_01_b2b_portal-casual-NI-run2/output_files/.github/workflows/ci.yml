name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install ruff==0.8.4 mypy==1.14.0
      - name: Ruff (lint + format check)
        run: |
          ruff check .
          ruff format --check .
      - name: mypy
        run: mypy app || true  # type findings are advisory, not blocking

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: saas
          POSTGRES_PASSWORD: saas
          POSTGRES_DB: saas_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U saas" --health-interval 5s
          --health-timeout 5s --health-retries 10
      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s
          --health-timeout 3s --health-retries 10
    env:
      ENVIRONMENT: test
      SECRET_KEY: ci-test-secret-key-not-used-in-production-00000
      DATABASE_URL: postgresql+psycopg://saas:saas@localhost:5432/saas_test
      REDIS_URL: redis://localhost:6379/0
      STRIPE_SECRET_KEY: sk_test_ci
      STRIPE_WEBHOOK_SECRET: whsec_ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install build deps for python3-saml
        run: sudo apt-get update && sudo apt-get install -y libxml2-dev libxmlsec1-dev libxmlsec1-openssl pkg-config
      - run: pip install -e ".[dev]"
      - name: Run migrations
        run: alembic upgrade head
      - name: Pytest
        run: pytest --cov=app --cov-report=term-missing --cov-report=xml
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml

  docker:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: saas-portal:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
