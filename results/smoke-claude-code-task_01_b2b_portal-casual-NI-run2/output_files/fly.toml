# Fly.io deployment manifest.
#
# First-time setup:
#   fly launch --no-deploy --copy-config
#   fly postgres create   &&  fly postgres attach <pg-app>
#   fly redis create      &&  fly secrets set REDIS_URL=...
#   fly secrets set SECRET_KEY=... STRIPE_SECRET_KEY=... STRIPE_WEBHOOK_SECRET=... \
#                   EMAIL_BACKEND=smtp SMTP_HOST=... SMTP_USERNAME=... SMTP_PASSWORD=...
#   fly deploy
#
# Migrations run automatically from docker-entrypoint.sh on every release.

app = "saas-portal"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  ENVIRONMENT = "production"
  PORT = "8000"
  BASE_URL = "https://saas-portal.fly.dev"
  ALLOWED_HOSTS = "saas-portal.fly.dev"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

  [[http_service.checks]]
    method = "GET"
    path = "/healthz"
    interval = "15s"
    timeout = "5s"
    grace_period = "20s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
