services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: admin_tool
      POSTGRES_USER: admin_tool
      POSTGRES_PASSWORD: admin_tool
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin_tool"]
      interval: 5s
      retries: 10

  redis:
    image: redis:7

  web:
    build: .
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8000:8000"
    command: >
      sh -c "python manage.py migrate &&
             python manage.py seed_roles &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4"

volumes:
  pgdata:
