services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: support
      POSTGRES_PASSWORD: support
      POSTGRES_DB: support
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U support"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build: .
    command: ["node", "dist/scripts/migrate.js"]
    environment:
      DATABASE_URL: postgres://support:support@db:5432/support
    depends_on:
      db:
        condition: service_healthy

  api:
    build: .
    command: ["node", "dist/server.js"]
    env_file: .env
    environment:
      DATABASE_URL: postgres://support:support@db:5432/support
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      migrate:
        condition: service_completed_successfully

  worker:
    build: .
    command: ["node", "dist/worker.js"]
    env_file: .env
    environment:
      DATABASE_URL: postgres://support:support@db:5432/support
    depends_on:
      migrate:
        condition: service_completed_successfully

volumes:
  pgdata:
