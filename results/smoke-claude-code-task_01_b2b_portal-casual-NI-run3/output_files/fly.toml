# Fly.io deployment. Create the app + Postgres first:
#   fly launch --no-deploy
#   fly postgres create && fly postgres attach <pg-app>
#   fly secrets set SECRET_KEY=... STRIPE_SECRET_KEY=... (etc.)
app = "acme-portal"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  ENVIRONMENT = "production"
  PORT = "8000"
  COOKIE_SECURE = "true"

# Migrations run on every release before the new version takes traffic.
[deploy]
  release_command = "alembic upgrade head"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.http_options]
    [http_service.http_options.response.headers]
      Strict-Transport-Security = "max-age=31536000; includeSubDomains"

  [[http_service.checks]]
    path = "/healthz"
    interval = "30s"
    timeout = "5s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
