name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: portal
          POSTGRES_PASSWORD: portal
          POSTGRES_DB: portal_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U portal"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://portal:portal@localhost:5432/portal_test?schema=public
      DIRECT_URL: postgresql://portal:portal@localhost:5432/portal_test?schema=public
      SESSION_SECRET: ci-session-secret-at-least-32-bytes-long-xx
      FIELD_ENCRYPTION_KEY: Y2ktb25seS0zMi1ieXRlLWtleS1mb3ItdGVzdGluZyE=
      STRIPE_SECRET_KEY: sk_test_ci
      STRIPE_WEBHOOK_SECRET: whsec_ci
      RESEND_API_KEY: re_ci
      EMAIL_FROM: Portal <noreply@example.com>
      METRICS_TOKEN: ci-metrics-token

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

  docker:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build container image
        run: docker build -t b2b-saas-portal:${{ github.sha }} .
      # Push step intentionally omitted — wire to your registry (ECR/GHCR/GCR)
      # and add credentials as repository secrets.
